<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Analytics — ScreenPencil</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#070b14" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg__grid"></div>
    <div class="bg__blob bg__blob--1"></div>
    <div class="bg__blob bg__blob--2"></div>
  </div>

  <main class="dash">
    <header class="dash__top">
      <div>
        <span class="eyebrow">Panel interno</span>
        <h1>Analytics de <span class="grad-text">ScreenPencil</span></h1>
      </div>
      <div class="dash__controls">
        <select id="period" aria-label="Periodo">
          <option value="24h">Últimas 24 h</option>
          <option value="7d" selected>7 días</option>
          <option value="30d">30 días</option>
          <option value="90d">90 días</option>
        </select>
        <button class="icon-btn" id="refresh" title="Actualizar" aria-label="Actualizar">↻</button>
        <button class="icon-btn" id="cfgBtn" title="Configuración" aria-label="Configuración">⚙</button>
      </div>
    </header>

    <!-- Configuración: URL del backend + API key (se guardan SOLO en este navegador) -->
    <form id="cfg" class="cfg" hidden>
      <label>URL del backend (API)
        <input id="apiBase" type="url" placeholder="http://localhost:3333" autocomplete="off" />
      </label>
      <label>API key (cabecera x-api-key)
        <input id="apiKey" type="password" placeholder="tu ADMIN_API_KEY" autocomplete="off" />
      </label>
      <button type="submit" class="btn btn--primary btn--sm">Guardar y cargar</button>
      <p class="cfg__note">🔒 Se guardan solo en tu navegador (localStorage). No se envían a ningún sitio salvo a tu backend.</p>
    </form>

    <div id="status" class="status" hidden></div>

    <section id="dashboard" hidden>
      <div class="kpis" id="kpis"></div>
      <div class="panels">
        <article class="panel" id="panel-gc">
          <h2>📊 GoatCounter</h2>
          <div class="panel__body"></div>
        </article>
        <article class="panel" id="panel-cf">
          <h2>🌐 Cloudflare</h2>
          <div class="panel__body"></div>
        </article>
      </div>

      <section class="panel panel--wide" id="panel-chart">
        <h2>📈 Tendencia diaria <span class="muted" style="font-weight:400">(páginas vistas)</span></h2>
        <div id="chart" class="chart"></div>
        <div id="chartLegend" class="chart__legend"></div>
      </section>

      <section class="panel panel--wide" id="panel-events">
        <h2>🎯 Eventos</h2>
        <div class="panel__body" id="eventsBody"></div>
      </section>
    </section>

    <footer class="dash__foot">
      <a href="https://screenpencil.goatcounter.com" target="_blank" rel="noopener">Panel GoatCounter ↗</a>
      <a href="https://dash.cloudflare.com/?to=/:account/web-analytics" target="_blank" rel="noopener">Panel Cloudflare ↗</a>
      <a href="index.html">← Volver al sitio</a>
    </footer>
  </main>

  <script src="assets/js/admin.js"></script>
</body>
</html>
