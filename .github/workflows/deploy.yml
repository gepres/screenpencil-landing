# Compila la landing (Astro) y la publica en GitHub Pages en cada push a main.
name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

# Permisos mínimos que necesita el deploy oficial de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; no cancela el que ya está en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        # La versión se toma de "packageManager" en package.json (pnpm@10.12.4).
        # No poner "version" aquí o choca con packageManager (ERR_PNPM_BAD_PM_VERSION).
        uses: pnpm/action-setup@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Configurar Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # habilita Pages la primera vez (si el repo lo permite)

      - name: Compilar (Astro)
        # base = ruta de Pages del repo → /screenpencil-landing/ (Pages de proyecto).
        # Para dominio propio en la raíz, cambia a BASE_PATH=/
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm build

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
